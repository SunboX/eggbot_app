name: Deploy to FTP (main)

on:
  push:
    branches: [ "main" ]
    # optional: only deploy if certain paths changed
    # paths:
    #   - "dist/**"
    #   - "public/**"
    #   - ".github/workflows/deploy-ftp.yml"

concurrency:
  group: ftp-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            deps:
              - 'package.json'
              - 'package-lock.json'
            deploy:
              - '.github/workflows/deploy-ftp.yml'
            src:
              - 'src/**'
            firmware:
              - 'firmware/**'
            api:
              - 'api/**'
            docs:
              - 'docs/**'
           
      # 1) Deploy web root payload -> /
      # Include src contents + package.json in one FTP session.
      - name: Prepare web root deploy payload
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.firmware == 'true' || steps.changes.outputs.deps == 'true' || steps.changes.outputs.deploy == 'true'
        run: |
          rm -rf .deploy-web-root
          mkdir -p .deploy-web-root
          cp -R src/. .deploy-web-root/
          cp -R firmware .deploy-web-root/firmware
          cp package.json .deploy-web-root/package.json

      - name: Deploy web root to /
        if: steps.changes.outputs.src == 'true' || steps.changes.outputs.firmware == 'true' || steps.changes.outputs.deps == 'true' || steps.changes.outputs.deploy == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./.deploy-web-root/
          server-dir: /
          exclude: |
            **/node_modules/**
            **/.env
            **/.env.*
            **/*.env
            **/*.env.*
          state-name: .ftp-deploy-src-state.json

      # 2) Deploy PHP backend -> /api/
      # Use curl with EPSV disabled because some shared FTP hosts reset data sockets on EPSV uploads.
      - name: Deploy api to /api/
        if: steps.changes.outputs.api == 'true' || steps.changes.outputs.deploy == 'true'
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          FTP_URL="${FTP_SERVER%/}"
          if [[ "$FTP_URL" != ftp://* && "$FTP_URL" != ftps://* ]]; then
            FTP_URL="ftp://${FTP_URL}"
          fi

          curl --fail --show-error --disable-epsv --ftp-create-dirs \
            --retry 5 --retry-delay 3 --retry-connrefused \
            --user "${FTP_USERNAME}:${FTP_PASSWORD}" \
            --upload-file ./api/chat.php \
            "${FTP_URL}/api/chat.php"

      # 3) Deploy docs -> /docs/ (used for AI grounding when AI_DOCS_DIR=docs)
      - name: Deploy docs to /docs/
        if: steps.changes.outputs.docs == 'true' || steps.changes.outputs.deploy == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./docs/
          server-dir: /docs/
          exclude: |
            **/.DS_Store
            **/.env
            **/.env.*
            **/*.env
            **/*.env.*
          state-name: .ftp-deploy-docs-state.json

      # 4) Deploy node_modules -> /node_modules/
      # Only install+deploy node_modules when deps changed
      - uses: actions/setup-node@v4
        if: steps.changes.outputs.deps == 'true' || steps.changes.outputs.deploy == 'true'
        with:
          node-version: 20
          cache: npm
          
      # - name: Install & build
      #   run: |
      #     npm ci
      #     npm run build

      # Prefer npm ci for CI + reproducible installs
      - name: Install production dependencies
        if: steps.changes.outputs.deps == 'true' || steps.changes.outputs.deploy == 'true'
        run: npm ci --omit=dev

      - name: Deploy node_modules
        if: steps.changes.outputs.deps == 'true' || steps.changes.outputs.deploy == 'true'
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./node_modules/
          server-dir: /node_modules/
          exclude: |
            **/.git*
            **/.github/**
            **/.env
            **/.env.*
            **/*.env
            **/*.env.*
          state-name: .ftp-deploy-nm-state.json
       
